services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_NAME: SmartOpsDocs
      DATABASE_URL: sqlite:////app/data/smartopsdocs.db
      JWT_SECRET: ${JWT_SECRET:-change-me-before-deploy}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-1440}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-admin123}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:8080,http://localhost:8080}
      UPLOAD_DIR: /app/data/uploads
      KNOWLEDGE_DIR: /app/data/knowledge
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      OPENAI_VISION_MODEL: ${OPENAI_VISION_MODEL:-gpt-4o-mini}
      OPENAI_EMBEDDING_MODEL: ${OPENAI_EMBEDDING_MODEL:-text-embedding-3-small}
      DOCX_VISION_MAX_IMAGES: ${DOCX_VISION_MAX_IMAGES:-20}
      AGENT_RUNTIME: ${AGENT_RUNTIME:-local-openclaw}
      OPENCLAW_ENDPOINT: ${OPENCLAW_ENDPOINT:-}
      OPENCLAW_API_KEY: ${OPENCLAW_API_KEY:-}
      OPENCLAW_AGENT: ${OPENCLAW_AGENT:-main}
      OPENCLAW_WEB_SKILLS: ${OPENCLAW_WEB_SKILLS:-browser-automation}
    volumes:
      - smartopsdocs-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped

volumes:
  smartopsdocs-data:
